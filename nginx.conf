# Place this in /etc/nginx/sites-available/briefing.effipm.com
# then: sudo ln -s /etc/nginx/sites-available/briefing.effipm.com /etc/nginx/sites-enabled/
# then: sudo certbot --nginx -d briefing.effipm.com
# then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name briefing.effipm.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name briefing.effipm.com;

    # SSL — filled in by certbot
    # ssl_certificate     /etc/letsencrypt/live/briefing.effipm.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/briefing.effipm.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Proxy to Node app
    location / {
        proxy_pass         http://127.0.0.1:3456;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        keep-alive;
        proxy_read_timeout 300s;   # workflow runs ~2-3 min
    }
}
